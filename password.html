<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PasswordLab — Генератор и анализ паролей</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Roboto', monospace;
        }

        body {
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            margin: 0;
        }

        /* Карточка сервиса */
        .lab-card {
            max-width: 680px;
            width: 100%;
            background: rgba(18, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            border: 1px solid rgba(71, 85, 105, 0.5);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            padding: 1.8rem 2rem 2.2rem;
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #E0F2FE, #A5F3FC);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0 0 0.25rem 0;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sub {
            color: #94a3b8;
            font-size: 0.85rem;
            border-left: 3px solid #38bdf8;
            padding-left: 12px;
            margin-bottom: 1.8rem;
            font-weight: 400;
        }

        /* Результат: пароль */
        .password-area {
            background: #0f172ad9;
            border-radius: 1.8rem;
            padding: 0.25rem;
            border: 1px solid #2d3a5e;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
        }

        .password-wrapper {
            display: flex;
            align-items: center;
            background: #0a0f1c;
            border-radius: 1.6rem;
            padding: 0.2rem 0.2rem 0.2rem 1.4rem;
            gap: 0.5rem;
        }

        #passwordOutput {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 1.3rem;
            font-weight: 500;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #e2e8f0;
            letter-spacing: 0.3px;
            padding: 0.9rem 0;
            outline: none;
            word-break: break-all;
        }

        .copy-btn {
            background: #1e293b;
            border: none;
            color: #b9c7db;
            font-size: 1.3rem;
            cursor: pointer;
            border-radius: 2rem;
            padding: 0.6rem 1.2rem;
            font-weight: 500;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: monospace;
        }

        .copy-btn:hover {
            background: #38bdf8;
            color: #0f172a;
            box-shadow: 0 0 8px #38bdf880;
        }

        /* Панель управления */
        .control-group {
            margin-bottom: 1.6rem;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            color: #cbd5e6;
            font-weight: 500;
            margin-bottom: 10px;
        }

        input[type="range"] {
            width: 100%;
            height: 5px;
            -webkit-appearance: none;
            background: #1e2a3e;
            border-radius: 10px;
            outline: none;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #38bdf8;
            border-radius: 50%;
            cursor: pointer; x-shadow: 0 0 6px #0ea5e9;
            border: none;
        }

        #lengthValue {
            background: #0f172a;
            padding: 4px 12px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: 600;
        }

        /* Чекбоксы */
        .checks {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin: 1rem 0 1.2rem;
        }

        .checks label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #cbd5e1;
            cursor: pointer;
            background: #1e293b70;
            padding: 5px 12px;
            border-radius: 60px;
            transition: 0.1s;
        }

        input[type="checkbox"] {
            width: 17px;
            height: 17px;
            accent-color: #38bdf8;
            cursor: pointer;
        }

        /* Анализ силы */
        .strength-card {
            background: #0f172a80;
            border-radius: 1.4rem;
            padding: 1rem 1.2rem;
            margin: 1.6rem 0 1.2rem;
            border-left: 4px solid #38bdf8;
        }

        .meter-bar {
            background: #1e2a3a;
            border-radius: 20px;
            height: 8px;
            width: 100%;
            margin: 12px 0 8px;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 0.25s ease, background 0.2s;
        }

        .strength-text {
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .crack-time {
            font-size: 0.8rem;
            font-family: monospace;
            color: #94a3b8;
        }

        .gen-btn {
            background: linear-gradient(95deg, #2563eb, #38bdf8);
            border: none;
            width: 100%;
            padding: 14px 0;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
            letter-spacing: 0.5px;
            box-shadow: 0 5px 12px #0ea5e940;
        }

        .gen-btn:hover {
            transform: scale(0.98);
            background: linear-gradient(95deg, #1e40af, #0ea5e9);
            box-shadow: 0 8px 20px #0284c750;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1.8rem;
            color: #4b556b;
        }

        max-width: 500px {
            .lab-card {
                padding: 1.2rem;
            }
            #passwordOutput {
                font-size: 1rem;
            }
            .copy-btn {
                padding: 0.4rem 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="lab-card">
    <h1>
        <span>🧪 PasswordLab</span>
    </h1>
    <div class="sub">Анализ энтропии · Генератор криптостойких паролей</div>

    <!-- Поле пароля -->
    <div class="password-area">
        <div class="password-wrapper">
            <input type="text" id="passwordOutput" readonly value="P@ssw0rdLab#2025" spellcheck="false">
            <button class="copy-btn" id="copyBtn">📋 Коп</button>
        </div>
    </div>

    <!-- Длина -->
    <div class="control-group">
        <div class="slider-label">
            <span>🔐 Длина пароля</span>
            <span id="lengthValue">16</span>
        </div>
        <input type="range" id="lengthSlider" min="8" max="32" value="16" step="1">
    </div>

    <!-- Наборы символов -->
    <div class="checks">
        <label><input type="checkbox" id="useUpper" checked> A-Z</label>
        <label><input type="checkbox" id="useLower" checked> a-z</label>
        <label><input type="checkbox" id="useDigits" checked> 0-9</label>
        <label><input type="checkbox" id="useSymbols" checked> !@#$%^&*</label>
    </div>

    <!-- Метрика силы -->
    <div class="st
rength-card">
        <div class="strength-text">
            <span id="strengthLabel">🟡 Средний</span>
            <span class="crack-time" id="crackEstimate">~ 2 дня</span>
        </div>
        <div class="meter-bar">
            <div class="meter-fill" id="strengthMeter" style="width: 45%; background: #facc15;"></div>
        </div>
        <div style="font-size: 0.75rem; color:#7f8ea3;">🔢 Энтропия: <span id="entropyBits">0</span> бит</div>
    </div>

    <button class="gen-btn" id="generateBtn">⚡ Сгенерировать новый пароль</button>
    <footer>PasswordLab — локальный генератор, пароли не покидают браузер</footer>
</div>

<script>
    (function() {
        // DOM элементы
        const passwordField = document.getElementById('passwordOutput');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthSpan = document.getElementById('lengthValue');
        const useUpper = document.getElementById('useUpper');
        const useLower = document.getElementById('useLower');
        const useDigits = document.getElementById('useDigits');
        const useSymbols = document.getElementById('useSymbols');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const strengthLabelSpan = document.getElementById('strengthLabel');
        const crackTimeSpan = document.getElementById('crackEstimate');
        const strengthMeter = document.getElementById('strengthMeter');
        const entropySpan = document.getElementById('entropyBits');

        // Символьные пулы
        const UPPER = 'ABCDEFGHJKLMNPQRSTUVWXYZ';      // исключаем похожие O и I по желанию, но оставим классику
        const LOWER = 'abcdefghijkmnopqrstuvwxyz';
        const DIGITS = '0123456789';
        const SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?';

        // Функция получения активного пула
        function getCharPool() {
            let pool = '';
            if (useUpper.checked) pool += UPPER;
            if (useLower.checked) pool += LOWER;
            if (useDigits.checked) pool += DIGITS;
            if (useSymbols.checked) pool += SYMBOLS;
            return pool;
        }

        // Генерация случайного пароля
        function generatePassword() {
            let pool = getCharPool();
            if (pool === '') {
                // если ничего не выбрано — принудительно включаем строчные
                useLower.checked = true;
                pool = LOWER;
            }
            const length = parseInt(lengthSlider.value, 10);
            let pwd = '';
            // Криптостойкий генератор (Web Crypto API)
            const randomArray = new Uint32Array(length);
            crypto.getRandomValues(randomArray);
            for (let i = 0; i < length; i++) {
                const randIndex = randomArray[i] % pool.length;
                pwd += pool[randIndex];
            }
            // Добавим гарантию: если чекбоксов много, но пароль должен включать хотя бы один символ из каждой выбранной группы? 
            // Простой алгоритм: перемешаем, но для удобства оставим как есть. Это обеспечит высокую случайность.
            // Однако, чтобы пароль точно содержал каждый выбранный тип, сделаем дополнительный пост-фикс:
            // Улучшим: гарантия присутствия каждого выбранного класса (по желанию пользователя)
            pwd = ensureAllCharTypes(pwd, length);
            return pwd;
        }

        // Функция, гарантирующая, что пароль содержит хотя бы один символ из каждого активного набора
        function ensureAllCharTypes(password, targetLen) {
            let needsUpper = useUpper.checked;
            let needsLower = useLower.checked;
            let needsDigit = useDigits.checked;
            let needsSym = useSymbols.checked;
            
            let hasUpper = /[A-Z]/.test(password);
            let hasLower = /[a-z]/.test(password);
            let hasDigit = /\d/.test(password);
            let hasSym = /[!@#$%^&*()_+\-=[\]{}|;:,.<>?]/.test(password);
            
            let requiredChars = [];

if (needsUpper && !hasUpper) requiredChars.push(getRandomChar(UPPER));
            if (needsLower && !hasLower) requiredChars.push(getRandomChar(LOWER));
            if (needsDigit && !hasDigit) requiredChars.push(getRandomChar(DIGITS));
            if (needsSym && !hasSym) requiredChars.push(getRandomChar(SYMBOLS));
            
            if (requiredChars.length === 0) return password;
            
            // замена случайных позиций в пароле, чтобы не менять длину
            let pwdArr = password.split('');
            for (let i = 0; i < requiredChars.length; i++) {
                let randPos = Math.floor(Math.random() * pwdArr.length);
                pwdArr[randPos] = requiredChars[i];
            }
            let result = pwdArr.join('');
            // если длина вдруг не совпала (не должно случиться)
            if (result.length !== targetLen) result = result.slice(0, targetLen);
            return result;
        }
        
        function getRandomChar(set) {
            const rand = new Uint32Array(1);
            crypto.getRandomValues(rand);
            return set[rand[0] % set.length];
        }

        // Вычисление энтропии и силы пароля
        function analyzePassword(password) {
            let poolSize = 0;
            if (/[A-Z]/.test(password)) poolSize += UPPER.length;
            if (/[a-z]/.test(password)) poolSize += LOWER.length;
            if (/\d/.test(password)) poolSize += DIGITS.length;
            if (/[!@#$%^&*()_+\-=[\]{}|;:,.<>?]/.test(password)) poolSize += SYMBOLS.length;
            
            if (poolSize === 0) poolSize = 26; // fallback
            
            const entropy = password.length * Math.log2(poolSize);
            const bits = entropy;
            let strength = 'weak';
            let percent = 0;
            let crackText = '';
            
            if (bits < 28) {
                strength = 'Очень слабый';
                percent = 18;
                crackText = 'мгновенно (секунды)';
            } else if (bits < 40) {
                strength = 'Слабый';
                percent = 34;
                crackText = 'несколько часов';
            } else if (bits < 60) {
                strength = 'Средний';
                percent = 55;
                crackText = 'до нескольких дней';
            } else if (bits < 80) {
                strength = 'Сильный';
                percent = 78;
                crackText = '~ 100+ лет';
            } else {
                strength = '🔒 Очень сильный';
                percent = 98;
                crackText = 'миллионы лет';
            }
            
            // Спец. оценка времени взлома (грубая)
            const combinations = Math.pow(2, bits);
            let seconds = combinations / 1e9;  // 1 млрд попыток/сек (грубая атака)
            if (seconds < 1) crackText = '< 1 секунды';
            else if (seconds < 3600) crackText = `${Math.round(seconds)} сек`;
            else if (seconds < 86400) crackText = `${Math.round(seconds/3600)} часов`;
            else if (seconds < 31536000) crackText = `${Math.round(seconds/86400)} дней`;
            else if (seconds < 1e9) crackText = `${Math.round(seconds/31536000)} лет`;
            else crackText = '> миллиона лет';
            
            let color = '';
            if (percent < 35) color = '#ef4444';
            else if (percent < 60) color = '#facc15';
            else if (percent < 85) color = '#2dd4bf';
            else color = '#4ade80';
            
            return {
                strengthLabel: strength,
                crackTime: crackText,
                percent: percent,
                entropyBits: bits.toFixed(1),
                fillColor: color
            };
        }
        
        function updateStrengthUI(password) {
            const analysis = analyzePassword(password);
            strengthLabelSpan.innerHTML = analysis.strengthLabel;
            crackTimeSpan.innerHTML = `⏱️ ${analysis.crackTime}`;
            strengthMeter.style.width = `${analysis.percent}%`;
            strengthMeter.style.background = analysis.
fillColor;
            entropySpan.innerText = analysis.entropyBits;
            // дополнительный цвет текста
            if (analysis.percent > 75) strengthLabelSpan.style.color = '#bef264';
            else if (analysis.percent > 45) strengthLabelSpan.style.color = '#fde047';
            else strengthLabelSpan.style.color = '#f87171';
        }
        
        // Обновить пароль и всё
        function refreshPassword() {
            const newPwd = generatePassword();
            passwordField.value = newPwd;
            updateStrengthUI(newPwd);
        }
        
        // Копирование
        async function copyToClipboard() {
            const text = passwordField.value;
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '✅ Готово!';
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                }, 1500);
            } catch (err) {
                copyBtn.innerHTML = '❌ Ошибка';
                setTimeout(() => {
                    copyBtn.innerHTML = '📋 Коп';
                }, 1000);
            }
        }
        
        // синхронизация длины
        function syncLength() {
            lengthSpan.innerText = lengthSlider.value;
            refreshPassword();
        }
        
        // события
        lengthSlider.addEventListener('input', () => {
            syncLength();
        });
        
        function onSettingsChange() {
            refreshPassword();
        }
        
        useUpper.addEventListener('change', onSettingsChange);
        useLower.addEventListener('change', onSettingsChange);
        useDigits.addEventListener('change', onSettingsChange);
        useSymbols.addEventListener('change', onSettingsChange);
        generateBtn.addEventListener('click', refreshPassword);
        copyBtn.addEventListener('click', copyToClipboard);
        
        // первоначальный запуск
        syncLength();
        refreshPassword();
    })();
</script>
</body>
</html> bo
